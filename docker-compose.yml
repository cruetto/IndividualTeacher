services:
  backend:
    build:
      context: ./backend
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: production
      FRONTEND_ORIGIN: https://quizzy.attentionisallineed.xyz
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
      PORT: "5000"
    expose:
      - "5000"
    networks:
      - quizzy_internal
    restart: unless-stopped

  mongo:
    image: mongodb/mongodb-atlas-local:latest
    container_name: quizzy-mongo-1
    hostname: quizzy-mongo-1
    restart: unless-stopped
    volumes:
      - quizzy_mongo_data:/data/db
      - quizzy_mongo_config:/data/configdb
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - quizzy_internal

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    networks:
      - quizzy_internal
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    expose:
      - "80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - quizzy_internal
      - northstar_web
    restart: unless-stopped

networks:
  quizzy_internal:
  northstar_web:
    external: true

volumes:
  quizzy_mongo_data:
  quizzy_mongo_config:
